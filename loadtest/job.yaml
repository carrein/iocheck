# k6 load test as a Kubernetes Job. Driven from inside the cluster against
# the ClusterIP so kube-proxy round-robins requests across iocheck pods,
# removing host-to-cluster network variance.
#
# Streams metrics to Prometheus via remote-write so they show up in the
# same Grafana dashboard as iocheck's own metrics.
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load
  namespace: iocheck
  labels:
    app: k6
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app: k6
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:1.3.0
          args:
            - run
            - --out=experimental-prometheus-rw
            - --summary-export=/artifacts/k6-summary.json
            - --tag=testid=$(SCENARIO)-$(TESTID)
            - /scripts/script.js
          env:
            - { name: SCENARIO, value: "unknown" }
            - { name: TESTID, value: "0" }
            - { name: TARGET_HOST, value: "http://iocheck.iocheck.svc:80" }
            - { name: K6_PROMETHEUS_RW_SERVER_URL, value: "http://prometheus-k8s.monitoring.svc:9090/api/v1/write" }
            - { name: K6_PROMETHEUS_RW_TREND_STATS, value: "p(50),p(95),p(99),min,max" }
          resources:
            requests: { cpu: 500m, memory: 256Mi }
            limits: { memory: 1Gi }
          volumeMounts:
            - { name: script, mountPath: /scripts }
            - { name: artifacts, mountPath: /artifacts }
      volumes:
        - name: script
          configMap: { name: k6-script }
        - name: artifacts
          emptyDir: {}
