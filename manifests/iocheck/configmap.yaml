apiVersion: v1
kind: ConfigMap
metadata:
  name: iocheck-config
  namespace: iocheck
data:
  PORT: "3000"
  DATABASE_URL: "postgres://iocheck:iocheckdev@postgres.iocheck.svc.cluster.local:5432/iocheck"
  REDIS_URL: "redis://redis.iocheck.svc.cluster.local:6379"
  # Per-pod app pool. Worst case 8 pods × 10 = 80 conns, well under
  # Postgres max_connections=200. Long-lived conns let Bun's named prepared
  # statements stay cached — no per-query Parse cost.
  PG_POOL_MAX: "10"
  # Time the pod stays "ready" while draining so kube-proxy can de-register.
  SHUTDOWN_GRACE_MS: "5000"
