apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: iocheck
  labels: { app: redis }
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: iocheck
spec:
  replicas: 1
  strategy: { type: Recreate } # single-replica; we don't want two during rollouts
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:7.4-alpine
          # Ephemeral by design: --save "" disables RDB snapshots; the cache
          # is reconstructible from Postgres. allkeys-lru evicts oldest under
          # memory pressure so the pod never OOMs from cache bloat.
          args:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - { containerPort: 6379, name: redis }
          readinessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 3
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 384Mi }
