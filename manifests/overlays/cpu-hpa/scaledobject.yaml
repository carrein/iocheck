# Scenario A — the "bad" autoscaler from EXERCISE.md.
#
# CPU-based ScaledObject. Targets 70% of the iocheck pod's CPU request.
# For our cache-heavy read workload, CPU rarely crosses this threshold even
# during a 10x RPS burst — measured pod CPU peaks at ~50-60% of request while
# p99 latency walls at multiple seconds (event-loop + DB-pool saturation).
#
# This overlay exists to make the failure mode VISIBLE in the demo.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: iocheck-cpu
  namespace: iocheck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iocheck
  pollingInterval: 15
  cooldownPeriod: 60 # only governs N->0; N->1 stabilization lives in HPA behavior below
  minReplicaCount: 2
  maxReplicaCount: 10
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 4
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70" # 70% of cpu request; matches EXERCISE.md's baseline
