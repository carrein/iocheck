# Scenario B — the "good" autoscaler.
#
# Trigger: cluster-wide RPS. With metricType=AverageValue, HPA divides the
# returned value by the current replica count internally — so the PromQL
# returns cluster-total RPS and the threshold reads as "RPS per pod".
# Pre-dividing in PromQL would double-divide (kedacore/keda#3035).
#
# Target: 100 RPS per pod. Calibrated to the measured saturation point of a
# single iocheck pod (~200 RPS sustainable cache-heavy with one Bun event
# loop and DB pool 10) with ~2x headroom.
#
# fallback: if Prometheus is unreachable for 3 polling cycles (45s), HPA
# pins to 4 replicas — mid-load safety net, neither starving at min nor
# thundering to max. Addresses the EXERCISE.md "what if the autoscaler's
# data source is unavailable" question.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: iocheck-rps
  namespace: iocheck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iocheck
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 2
  maxReplicaCount: 10
  fallback:
    failureThreshold: 3
    replicas: 4
    behavior: static
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 4
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 60
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
  triggers:
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://prometheus-k8s.monitoring.svc:9090
        # Cluster-total RPS. HPA divides by replica count to get per-pod load.
        query: sum(rate(http_requests_total{service="iocheck"}[1m]))
        threshold: "100"
        activationThreshold: "5"
