# Replace kube-prometheus's prometheus-k8s NetworkPolicy ingress with one
# that also permits:
#   - KEDA (operator + metrics-apiserver) so the Prometheus scaler can query metrics
#   - any namespace labeled monitoring=true (e.g. iocheck) for k6's
#     remote-write push and any in-cluster smoke checks
#
# Applied via `kubectl apply -f` after kube-prometheus's manifests so it
# overrides the upstream policy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-k8s
  namespace: monitoring
  labels:
    app.kubernetes.io/component: prometheus
    app.kubernetes.io/instance: k8s
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: kube-prometheus
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: prometheus
      app.kubernetes.io/instance: k8s
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/part-of: kube-prometheus
  policyTypes: [Ingress, Egress]
  egress:
    - {}
  ingress:
    - ports:
        - { port: 9090, protocol: TCP }
        - { port: 8080, protocol: TCP }
      from:
        - podSelector:
            matchLabels: { app.kubernetes.io/name: prometheus }
        - podSelector:
            matchLabels: { app.kubernetes.io/name: prometheus-adapter }
        - podSelector:
            matchLabels: { app.kubernetes.io/name: grafana }
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: keda }
        - namespaceSelector:
            matchLabels: { monitoring: "true" }
